# Pipeline de deploy do Video Orchestrator Lambda
# .NET 10 | restore → build → publish → zip → deploy
# CI: .NET 10.x (setup-dotnet)

name: Deploy Lambda

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.x'
  LAMBDA_PROJECT: src/InterfacesExternas/VideoProcessing.VideoOrchestrator.Lambda/VideoProcessing.VideoOrchestrator.Lambda.csproj
  PUBLISH_OUTPUT: publish
  ZIP_NAME: lambda-deploy.zip

jobs:
  sonar-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore dependencies
        run: dotnet restore src/VideoOrchestrator.slnx

      - name: Begin SonarCloud analysis
        run: |
          dotnet sonarscanner begin \
            /k:"diegoknsk_video-processing-engine-video-orchestrator-lambda" \
            /o:"diegoknsk" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.projectBaseDir="${{ github.workspace }}" \
            /d:sonar.sources="src/" \
            /d:sonar.tests="src/tests/" \
            /d:sonar.exclusions="**/bin/**,**/obj/**,**/*.Designer.cs" \
            /d:sonar.test.exclusions="src/tests/**/" \
            /d:sonar.coverage.exclusions="**/Program.cs,**/*Extensions.cs" \
            /d:sonar.cs.opencover.reportsPaths="src/tests/**/TestResults/**/coverage.opencover.xml"

      - name: Build solution
        run: dotnet build src/VideoOrchestrator.slnx --configuration Release --no-restore

      - name: Run tests with coverage
        run: |
          dotnet test src/VideoOrchestrator.slnx \
            --configuration Release \
            --no-build \
            --verbosity normal \
            /p:CollectCoverage=true \
            /p:CoverageReporter=opencover \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=./TestResults/coverage.opencover.xml

      - name: End SonarCloud analysis
        run: |
          dotnet sonarscanner end \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  build-and-deploy:
    name: Build and Deploy
    needs: [sonar-analysis]
    if: always() && (needs.sonar-analysis.result == 'success' || needs.sonar-analysis.result == 'skipped') && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.LAMBDA_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.LAMBDA_PROJECT }} -c Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.LAMBDA_PROJECT }} -c Release -r linux-x64 --self-contained false -o ${{ env.PUBLISH_OUTPUT }}

      - name: Create deployment package
        run: |
          cd ${{ env.PUBLISH_OUTPUT }}
          zip -r ../${{ env.ZIP_NAME }} .
          cd ..
          echo "Zip criado: $(ls -la ${{ env.ZIP_NAME }})"

      # Autenticação AWS via secrets (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN quando aplicável)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://${{ env.ZIP_NAME }}

      - name: Wait for code update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}

      - name: Set Lambda handler and environment variables
        env:
          VM_BASE_URL: ${{ vars.VIDEO_MANAGEMENT_API__BASE_URL }}
          VM_TIMEOUT: ${{ vars.VIDEO_MANAGEMENT_API__TIMEOUT_SECONDS }}
          M2M_ENDPOINT: ${{ secrets.M2M_AUTH__TOKEN_ENDPOINT }}
          M2M_CLIENT_ID: ${{ secrets.M2M_AUTH__CLIENT_ID }}
          M2M_CLIENT_SECRET: ${{ secrets.M2M_AUTH__CLIENT_SECRET }}
          SF_ARN: ${{ secrets.STEP_FUNCTION__STATE_MACHINE_ARN }}
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }} \
            --handler "VideoProcessing.VideoOrchestrator.Lambda::VideoProcessing.VideoOrchestrator.Lambda.Function::FunctionHandler" \
            --environment "Variables={VIDEO_MANAGEMENT_API__BASE_URL=${VM_BASE_URL},VIDEO_MANAGEMENT_API__TIMEOUT_SECONDS=${VM_TIMEOUT},M2M_AUTH__TOKEN_ENDPOINT=${M2M_ENDPOINT},M2M_AUTH__CLIENT_ID=${M2M_CLIENT_ID},M2M_AUTH__CLIENT_SECRET=${M2M_CLIENT_SECRET},STEP_FUNCTION__STATE_MACHINE_ARN=${SF_ARN}}"

      - name: Wait for configuration update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}
          echo "Lambda function updated successfully"
