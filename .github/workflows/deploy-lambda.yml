# Pipeline de deploy do Video Orchestrator Lambda
# .NET 10 | restore → build → publish → zip → deploy
# CI: .NET 10.x (setup-dotnet)

name: Deploy Lambda

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.x'
  LAMBDA_PROJECT: src/VideoOrchestrator/VideoOrchestrator.csproj
  PUBLISH_OUTPUT: publish
  ZIP_NAME: lambda-deploy.zip

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.LAMBDA_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.LAMBDA_PROJECT }} -c Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.LAMBDA_PROJECT }} -c Release -r linux-x64 --self-contained false -o ${{ env.PUBLISH_OUTPUT }}

      - name: Create deployment package
        run: |
          cd ${{ env.PUBLISH_OUTPUT }}
          zip -r ../${{ env.ZIP_NAME }} .
          cd ..
          echo "Zip criado: $(ls -la ${{ env.ZIP_NAME }})"

      # Autenticação AWS via secrets (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN quando aplicável)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://${{ env.ZIP_NAME }}
